<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />

<style>
  /* 7-segment LCD face for the frequency readout (authentic C4 digital dash) */
  @font-face {
    font-family:"DSEG7";
    src:local('DSEG7 Classic Bold'), local('DSEG7 Classic'),
        url("https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2") format("woff2"),
        url("https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff") format("woff");
    font-weight:700; font-style:normal; font-display:swap;
  }

  :root {
    --bg:#0a0a0b; --graphite:#141315; --surface:#1c1b1d;
    --panel-2:rgba(255,255,255,.035);
    --line:rgba(255,255,255,.085); --line-2:rgba(255,255,255,.05);
    --text:#ece7df; --muted:#9a948a; --faint:#857f75;
    --signal:#E3B24A; --signal-dim:#6b5a2b; --amber-soft:rgba(227,178,74,.12);
    --alert:#ef5a37;
    --shadow:0 20px 50px rgba(0,0,0,.55);
    --sans:"Archivo",system-ui,-apple-system,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    color-scheme:dark;
  }
  [data-theme="light"] {
    --bg:#ece8e0; --graphite:#f6f3ed; --surface:#e8e3d9;
    --panel-2:rgba(255,255,255,.5);
    --line:rgba(0,0,0,.12); --line-2:rgba(0,0,0,.06);
    --text:#1c1813; --muted:#5f574a; --faint:#756c5d;
    --signal:#915006; --signal-dim:#c9a86e; --amber-soft:rgba(145,80,6,.10);
    --alert:#bb3318;
    --shadow:0 18px 44px rgba(40,30,15,.18);
    color-scheme:light;
  }
  /* Light theme: lift the dark inset surfaces so they read as soft light-gray, not muddy */
  [data-theme="light"] .readout { background:rgba(0,0,0,.06); }
  [data-theme="light"] .search input { background:rgba(0,0,0,.03); }
  [data-theme="light"] .dial { background:linear-gradient(180deg, rgba(0,0,0,.045), transparent 45%); }
  [data-theme="light"] .seg { background:rgba(0,0,0,.035); }
  * { box-sizing:border-box; }
  html { background:#0a0a0b; }
  html,body { height:100%; margin:0; }
  body { font-family:var(--sans);
         background:var(--bg); color:var(--text); overflow:hidden;
         transition:background-color .35s ease, color .35s ease; }

  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }

  #map { position:fixed; inset:0; }

  /* ---------- Night-nav map overlay: a restrained vignette only ---------- */
  .map-fx { position:fixed; inset:0; pointer-events:none; z-index:1; }
  .map-fx::after { content:""; position:absolute; inset:0;
    background:radial-gradient(150% 120% at 60% 50%, transparent 58%, rgba(0,0,0,.55) 100%); }
  [data-theme="light"] .map-fx::after { background:radial-gradient(150% 120% at 60% 50%, transparent 62%, rgba(120,110,90,.26) 100%); }

  /* ---------- Map controls ---------- */
  .maplibregl-ctrl-bottom-right { z-index:4; }
  .maplibregl-ctrl-group { background:rgba(20,19,21,.94)!important; border:1px solid var(--line)!important;
    border-radius:3px!important; box-shadow:0 0 0 1px rgba(0,0,0,.4)!important; overflow:hidden; }
  .maplibregl-ctrl-group button + button { border-top:1px solid var(--line-2)!important; }
  .maplibregl-ctrl-group button .maplibregl-ctrl-icon { filter:invert(1) brightness(.85); }
  [data-theme="light"] .maplibregl-ctrl-group { background:rgba(241,237,227,.95)!important; }
  [data-theme="light"] .maplibregl-ctrl-group button .maplibregl-ctrl-icon { filter:none; }
  .maplibregl-ctrl-attrib { font-family:var(--mono); font-size:10px; opacity:.8; background:rgba(10,10,11,.6)!important; }
  .maplibregl-ctrl-attrib a { color:var(--muted)!important; }

  /* ---------- Console / receiver ---------- */
  .receiver {
    position:fixed; top:16px; left:16px; bottom:16px;
    width:380px; max-width:calc(100vw - 32px);
    display:flex; flex-direction:column; z-index:6;
    background:linear-gradient(180deg, var(--graphite), var(--bg));
    border:1px solid var(--line); border-radius:4px;
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
    overflow:hidden; animation:rise .45s ease both;
  }
  @keyframes rise { from{opacity:0;} to{opacity:1;} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(3px);} to{opacity:1;transform:none;} }
  .sheet-handle { display:none; }
  #mapTopbar { display:none; }

  /* ---------- Header / branding ---------- */
  .head { display:flex; align-items:center; gap:12px; padding:16px 16px 14px; border-bottom:1px solid var(--line-2); }
  .brand { display:flex; flex-direction:column; line-height:1; }
  .wordmark { font-family:"Sora",var(--sans); font-weight:600; font-size:20px; letter-spacing:-.012em;
    color:var(--text); }
  .wordmark b { color:var(--signal); font-weight:600; }
  [data-theme="dark"] .wordmark b { color:var(--text); }
  .tagline { margin-top:7px; font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.02em; }

  /* ---------- Shared segmented control ---------- */
  .seg { display:flex; gap:2px; padding:3px; border:1px solid var(--line-2); border-radius:3px; background:rgba(0,0,0,.22); }
  .seg button { font:inherit; font-family:var(--sans); font-size:11px; font-weight:600; letter-spacing:.04em;
    color:var(--muted); background:transparent; border:1px solid transparent; cursor:pointer;
    padding:5px 13px; border-radius:2px; transition:color .15s, background .15s; }
  .seg button:hover { color:var(--text); }
  .seg button[aria-pressed="true"] { color:#fff; background:var(--signal); }
  /* dark mode: same light gold as every other accent; dark label since white fails contrast on it */
  [data-theme="dark"] .seg button[aria-pressed="true"],
  [data-theme="dark"] .leaguebar button[aria-pressed="true"],
  [data-theme="dark"] .sports-cta button { color:#17120a; }
  .seg button:focus-visible { outline:none; box-shadow:0 0 0 2px color-mix(in srgb,var(--signal) 55%,transparent); }
  .head .seg { margin-left:auto; }

  /* ---------- Search ---------- */
  .search { padding:14px 16px 10px; }
  .search-row { position:relative; }
  .search input { width:100%; font-family:var(--mono); font-size:13px; color:var(--text);
    background:rgba(0,0,0,.22); border:1px solid var(--line-2); border-radius:3px;
    padding:11px 12px 11px 36px; outline:none; transition:border-color .15s; }
  .search input:focus { border-color:var(--signal); }
  .search input::placeholder { color:var(--faint); font-size:13px; }
  .search .pin-ico { position:absolute; left:12px; top:50%; transform:translateY(-50%);
    width:15px; height:15px; color:var(--muted); pointer-events:none; }
  .hint { margin:8px 2px 0; font-family:var(--mono); font-size:11px; color:var(--faint); }
  .hint kbd { font-family:var(--mono); font-size:10px; background:var(--panel-2);
    border:1px solid var(--line-2); border-radius:2px; padding:1px 5px; color:var(--muted); }

  /* ---------- Selected location ---------- */
  .loc { margin:6px 16px 0; padding:11px 13px; position:relative; display:none;
    background:var(--panel-2); border:1px solid var(--line);
    clip-path:polygon(0 0, calc(100% - 11px) 0, 100% 11px, 100% 100%, 11px 100%, 0 calc(100% - 11px)); }
  .loc.show { display:block; }
  .loc .place { color:var(--text); font-family:var(--sans); font-size:13px; font-weight:600; margin-bottom:5px; }
  .loc .coords { font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:.04em; }
  .loc .coords::before { content:"◉ "; color:var(--signal); }

  .views { display:flex; justify-content:center; padding:13px 16px 4px; }

  /* ---------- Tuner module ---------- */
  .tuner { display:none; padding:8px 16px 12px; }
  .tuner.show { display:block; }
  .readout { position:relative; text-align:center; min-height:78px; padding:15px 12px 11px; overflow:hidden;
    background:rgba(0,0,0,.28); border:1px solid var(--line-2);
    clip-path:polygon(11px 0, calc(100% - 11px) 0, 100% 11px, 100% calc(100% - 11px), calc(100% - 11px) 100%, 11px 100%, 0 calc(100% - 11px), 0 11px); }
  .rd-line { position:relative; z-index:1; white-space:nowrap; padding-bottom:9px; border-bottom:1px solid var(--line-2); }
  .rd-wrap { position:relative; display:inline-block; }
  .rd-ghost { position:absolute; left:0; top:0; font-family:"DSEG7",var(--mono); font-weight:700;
    font-size:40px; line-height:1; letter-spacing:2px; color:var(--signal); opacity:.08; pointer-events:none; }
  .rd-freq { position:relative; font-family:"DSEG7",var(--mono); font-weight:700; font-size:40px;
    line-height:1; letter-spacing:2px; color:var(--signal); text-shadow:0 0 12px rgba(227,178,74,.22); }
  [data-theme="light"] .rd-freq { text-shadow:none; }
  [data-theme="light"] .rd-ghost { opacity:.12; }
  .rd-unit { font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:9px;
    letter-spacing:.1em; text-transform:uppercase; vertical-align:bottom; }
  .rd-near { display:block; margin-top:9px; position:relative; z-index:1;
    font-family:var(--mono); font-size:11px; color:var(--faint);
    height:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rd-near b { color:var(--signal); font-weight:600; }

  .dial { position:relative; height:66px; margin:12px 0; overflow:hidden;
    cursor:grab; touch-action:none; user-select:none; -webkit-user-select:none; outline:none; }
  .dial:active { cursor:grabbing; }
  .dial[aria-disabled="true"] { cursor:default; opacity:.5; }
  .dial:focus-visible { box-shadow:0 0 0 2px color-mix(in srgb,var(--signal) 50%,transparent); border-radius:3px; }
  .dial::after { content:""; position:absolute; left:0; right:0; bottom:18px; height:1px; background:var(--line-2); pointer-events:none; z-index:1; }
  .strip { position:absolute; top:0; left:0; height:100%; will-change:transform; }
  .t { position:absolute; bottom:18px; width:1px; background:var(--muted); }
  .t.min { height:7px; opacity:.3; }
  .t.med { height:12px; opacity:.5; }
  .t.maj { height:20px; opacity:.8; }
  .tlab { position:absolute; bottom:0; transform:translateX(-50%);
    font-family:var(--mono); font-size:9px; color:var(--muted); opacity:.7; }
  .pip { position:absolute; bottom:18px; width:2px; height:28px; background:var(--muted); opacity:.55; transform:translateX(-1px); }
  .pip.near { opacity:1; height:32px; background:var(--signal); }
  .pip.multi::after { content:""; position:absolute; left:50%; top:-4px; transform:translateX(-50%);
    width:3px; height:3px; border-radius:50%; background:var(--muted); }
  .pip.near.multi::after { background:var(--signal); }
  .needle { position:absolute; top:2px; bottom:18px; left:50%; width:2px; z-index:3;
    background:var(--signal); transform:translateX(-50%); }
  .needle::before { content:""; position:absolute; top:-1px; left:50%; transform:translateX(-50%);
    border-left:5px solid transparent; border-right:5px solid transparent; border-top:8px solid var(--signal); }
  .mask-l,.mask-r { position:absolute; top:0; bottom:0; width:48px; z-index:2; pointer-events:none; }
  .mask-l { left:0; background:linear-gradient(90deg, var(--bg), transparent); }
  .mask-r { right:0; background:linear-gradient(270deg, var(--bg), transparent); }
  .dial-empty { position:absolute; inset:0; display:none; place-items:center; text-align:center; z-index:4;
    font-family:var(--mono); font-size:11px; color:var(--muted); padding:0 24px; pointer-events:none; }
  .dial-empty.show { display:grid; }
  .bandrow { display:flex; justify-content:center; margin-top:12px; }

  /* ---------- Station list ---------- */
  .list { flex:1 1 0; min-height:0; overflow-y:auto; padding:8px 10px 6px; display:none; position:relative; z-index:1; }
  .list.show { display:block; }
  .list::-webkit-scrollbar { width:8px; }
  .list::-webkit-scrollbar-thumb { background:var(--line); border-radius:0; }
  .status { padding:26px 18px; text-align:center; color:var(--muted); font-family:var(--mono); font-size:12px; }
  .status .big { display:block; font-family:var(--sans); color:var(--text); font-size:13px;
    font-weight:600; letter-spacing:.02em; margin-bottom:8px; }

  .station { display:flex; align-items:center; gap:11px; padding:9px 10px; position:relative;
    cursor:pointer; border:1px solid transparent; border-bottom:1px solid var(--line-2); border-radius:2px;
    transition:background .12s; }
  .station:last-child { border-bottom-color:transparent; }
  .station:hover { background:var(--panel-2); }
  .station:focus-visible { outline:none; border-color:var(--signal); }
  .station.active { background:var(--amber-soft); }
  .station.active::before { content:""; position:absolute; left:-10px; top:0; bottom:0; width:3px; background:var(--signal); }
  .station.active .name { color:var(--signal); }
  .station .fav { width:32px; height:32px; flex:none; background:var(--panel-2);
    border:1px solid var(--line-2); border-radius:2px; display:grid; place-items:center; overflow:hidden; color:var(--muted); }
  .station .fav img { width:100%; height:100%; object-fit:cover; }
  .station .meta { min-width:0; flex:1; overflow:hidden; }
  .station .name { display:block; font-family:var(--sans); font-size:13px; font-weight:500; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .station .sub { display:block; font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .freq { flex:none; font-family:var(--mono); font-size:11px; color:var(--muted);
    border:1px solid var(--line); padding:3px 7px; border-radius:2px; }
  .freq.codec { color:var(--faint); }
  .station.active .freq:not(.codec) { color:var(--signal); border-color:var(--signal-dim); }

  /* ---------- Now-playing dock ---------- */
  .dock { border-top:1px solid var(--line); padding:11px 14px; min-height:66px; position:relative; z-index:1;
    background:var(--panel-2); display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:12px; }
  .dock, .credits { flex:none; }
  .dock.empty { display:block; text-align:center; padding:15px; font-family:var(--mono); font-size:11px; color:var(--faint); }
  .dock .np { animation:fadeUp .28s ease both; }
  .playbtn { width:44px; height:44px; flex:none; border-radius:50%; border:1px solid var(--signal-dim);
    background:transparent; color:var(--signal); cursor:pointer; display:grid; place-items:center;
    transition:transform .1s, background .15s; }
  .playbtn:hover { background:var(--amber-soft); }
  .playbtn:active { transform:scale(.94); }
  .playbtn:focus-visible { outline:none; box-shadow:0 0 0 3px color-mix(in srgb,var(--signal) 30%,transparent); }
  .np { min-width:0; }
  .np .np-name { font-family:var(--sans); font-size:13px; font-weight:600; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .np .np-sub { font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:3px;
    display:flex; align-items:center; gap:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .np .np-sub.error { color:var(--alert); }
  .np .np-freq { font-family:var(--mono); color:var(--signal); letter-spacing:.04em; }
  .np-spinner { width:10px; height:10px; flex:none; border:2px solid var(--signal-dim);
    border-top-color:var(--signal); border-radius:50%; display:inline-block; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .signal-bars { display:inline-flex; align-items:flex-end; gap:2px; height:9px; flex:none; }
  .signal-bars i { width:3px; background:var(--signal); border-radius:0; height:30%; opacity:.55; }
  .signal-bars i:nth-child(2){ height:55%; } .signal-bars i:nth-child(3){ height:80%; } .signal-bars i:nth-child(4){ height:100%; }
  .playing .signal-bars i { animation:bars 1.05s ease-in-out infinite; opacity:1; }
  .playing .signal-bars i:nth-child(2){ animation-delay:.15s; } .playing .signal-bars i:nth-child(3){ animation-delay:.3s; } .playing .signal-bars i:nth-child(4){ animation-delay:.45s; }
  @keyframes bars { 0%,100%{transform:scaleY(.4);} 50%{transform:scaleY(1);} }
  .vol { width:78px; accent-color:var(--signal); cursor:pointer; }
  .vol:focus-visible { outline:2px solid color-mix(in srgb,var(--signal) 55%,transparent); outline-offset:2px; }
  .skipbtn { font-family:var(--mono); font-size:10.5px; color:var(--signal); background:transparent;
    border:1px solid var(--signal-dim); border-radius:2px; padding:7px 11px; cursor:pointer; white-space:nowrap; }
  .skipbtn:hover { background:var(--amber-soft); }
  .skipbtn:focus-visible { outline:none; box-shadow:0 0 0 2px color-mix(in srgb,var(--signal) 45%,transparent); }

  .credits { font-family:var(--mono); font-size:10px; color:var(--faint); text-align:center;
    padding:10px 14px 13px; border-top:1px solid var(--line-2); }
  .credits a { color:var(--muted); text-decoration:none; }
  .credits a:hover { color:var(--text); }

  /* ---------- Sports panel ---------- */
  .sports { display:none; flex:1 1 0; min-height:0; flex-direction:column; }
  .sports.show { display:flex; }
  .leaguebar { display:flex; gap:6px; overflow-x:auto; padding:10px 14px 9px; border-bottom:1px solid var(--line-2); }
  .leaguebar::after { content:""; flex:0 0 6px; }   /* end spacer so the last chip isn't flush to the edge */
  .leaguebar::-webkit-scrollbar { height:0; }
  .leaguebar button { flex:none; font-family:var(--sans); font-size:11px; font-weight:600; letter-spacing:.02em;
    color:var(--muted); background:transparent; border:1px solid var(--line-2); border-radius:2px;
    padding:5px 11px; cursor:pointer; white-space:nowrap; transition:color .15s, background .15s, border-color .15s; }
  .leaguebar button:hover { color:var(--text); }
  .leaguebar button[aria-pressed="true"] { color:#fff; background:var(--signal); border-color:var(--signal); }
  .games { flex:1 1 0; min-height:0; overflow-y:auto; padding:8px 12px 12px; }
  .games::-webkit-scrollbar { width:8px; }
  .games::-webkit-scrollbar-thumb { background:var(--line); }
  .game { padding:11px 12px; border:1px solid var(--line-2); border-radius:3px; margin-bottom:8px; background:var(--panel-2); }
  .game .gtime { font-family:var(--mono); font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:.04em; }
  .game .gmatch { font-family:var(--sans); font-size:13.5px; font-weight:600; color:var(--text); margin:5px 0 8px; }
  .game .gradio { display:flex; flex-wrap:wrap; gap:6px; }
  .game .rbtn, .game .citybtn { font-family:var(--mono); font-size:11px; color:var(--signal); cursor:pointer;
    background:var(--amber-soft); border:1px solid var(--signal-dim); border-radius:2px; padding:4px 9px; }
  .game .rbtn:hover, .game .citybtn:hover { background:color-mix(in srgb,var(--signal) 22%,transparent); }
  .game .gnote { font-family:var(--mono); font-size:9.5px; color:var(--faint); margin-top:8px; line-height:1.5; }

  /* ---------- Sports CTA (floating, top-right) ---------- */
  .sports-cta { position:fixed; top:16px; right:16px; z-index:6; display:flex; align-items:center; gap:9px;
    padding:8px 10px 8px 13px; background:linear-gradient(180deg, var(--graphite), var(--bg));
    border:1px solid var(--line); border-radius:4px; box-shadow:var(--shadow);
    font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.02em; }
  .sports-cta button { font-family:var(--sans); font-size:11px; font-weight:600; letter-spacing:.04em;
    color:#fff; background:var(--signal); border:1px solid var(--signal); border-radius:2px;
    padding:5px 12px; cursor:pointer; transition:filter .15s; }
  .sports-cta button:hover { filter:brightness(1.08); }
  .sports-cta button:focus-visible { outline:none; box-shadow:0 0 0 2px color-mix(in srgb,var(--signal) 55%,transparent); }
  @media (max-width:640px) { .sports-cta { top:10px; right:8px; gap:7px; padding:6px 8px 6px 11px; font-size:10px; } }

  /* ---------- Map pin / signal-lock reticle ---------- */
  .pin { position:relative; width:20px; height:20px; }
  .pin .dot { position:absolute; inset:7px; border-radius:50%; background:var(--signal);
    box-shadow:0 0 0 3px rgba(227,178,74,.18); }
  .pin .ring { position:absolute; inset:0; border-radius:50%; border:1.5px solid var(--signal); animation:ping 2s ease-out infinite; }
  .pin::before,.pin::after { content:""; position:absolute; background:var(--signal); opacity:.9; }
  .pin::before { left:50%; top:-2px; bottom:-2px; width:1.5px; transform:translateX(-.75px); }
  .pin::after { top:50%; left:-2px; right:-2px; height:1.5px; transform:translateY(-.75px); }
  @keyframes ping { 0%{transform:scale(.6);opacity:.8;} 100%{transform:scale(2.2);opacity:0;} }

  @media (max-width:640px) {
    .receiver {
      /* top anchored below the floating search/location topbar so the sheet can never cover it */
      top:calc(96px + env(safe-area-inset-top)); left:0; right:0; bottom:0; width:auto; max-width:none;
      height:auto; max-height:none;
      border-radius:16px 16px 0 0; animation:none;
      transform:translateY(67vh);
      transition:transform .3s cubic-bezier(.2,.7,.2,1);
    }
    /* Search + location live over the map on mobile (moved here by JS) */
    #mapTopbar { display:block; position:fixed; top:calc(8px + env(safe-area-inset-top));
      left:8px; right:90px; z-index:7; pointer-events:none; }
    #mapTopbar > * { pointer-events:auto; }
    #mapTopbar .search { padding:0; }
    #mapTopbar .search input { font-size:16px; /* ≥16px stops iOS focus-zoom */
      background:var(--graphite); border-color:var(--line); box-shadow:var(--shadow); }
    #mapTopbar .loc { margin:6px 0 0; padding:7px 11px; background:var(--graphite); box-shadow:var(--shadow); }
    #mapTopbar .loc.show { display:flex; align-items:center; gap:8px; }
    #mapTopbar .loc .place { margin:0; font-size:11.5px; min-width:0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #mapTopbar .loc .coords { font-size:10px; flex:none; }
    .sports-cta span { display:none; }   /* just the gold Sports button up top */
    .sports-cta { padding:4px; }
    .sheet-handle { display:block; height:26px; flex:none; position:relative; cursor:pointer; touch-action:manipulation; }
    .sheet-handle::before { content:""; position:absolute; left:50%; top:11px; width:9px; height:9px;
      border-right:2px solid var(--muted); border-bottom:2px solid var(--muted);
      transform:translate(-50%,-3px) rotate(-135deg); transition:transform .2s ease; opacity:.7; }
    .sheet-open .sheet-handle::before { transform:translate(-50%,1px) rotate(45deg); }
    .list { min-height:100px; }
    .rd-freq,.rd-ghost { font-size:34px; }
    .seg button { padding-top:12px; padding-bottom:12px; }
    .views { padding:8px 16px 2px; }
    .credits { padding:7px 14px calc(8px + env(safe-area-inset-bottom)); }
    /* FM/AM folds into the readout's top-right corner — frees a whole row so the dock stays on-screen */
    .tuner { position:relative; }
    .bandrow { position:absolute; top:15px; right:24px; margin:0; }
    .bandrow .seg button { padding:5px 9px; font-size:10px; }
    .readout { text-align:left; padding-left:18px; }
    .rd-near { text-align:left; }
    .leaguebar button { padding-top:12px; padding-bottom:12px; }
    .credits { padding-bottom:calc(13px + env(safe-area-inset-bottom)); }
    .maplibregl-ctrl-bottom-right .maplibregl-ctrl-group { display:none; }
  }
  @media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation:none!important; transition:none!important; } }
</style>
</head>
<body>
  <div id="map"></div>
  <div class="map-fx" aria-hidden="true"></div>
  <div id="mapTopbar"></div>
  <div class="sports-cta" id="sportsCta">
    <span>Tune into TuneThere</span>
    <button id="ctaSports" type="button" aria-label="Open TuneThere Sports">Sports</button>
  </div>
  <noscript>
    <div style="position:fixed;inset:0;display:grid;place-items:center;background:#0a0a0b;color:#ece7df;
      font-family:system-ui,sans-serif;padding:24px;text-align:center;z-index:9999">
      TuneThere needs JavaScript enabled to load the map and stream radio.
    </div>
  </noscript>

  <section class="receiver" aria-label="Radio receiver">
    <div class="sheet-handle" id="sheetHandle" role="button" tabindex="0" aria-label="Expand or collapse panel" aria-expanded="false"></div>
    <header class="head">
      <div class="brand">
        <span class="wordmark">Tune<b>There</b></span>
        <span class="tagline">tap the map to drop a pin · tune in</span>
      </div>
      <div class="seg" role="group" aria-label="Map theme">
        <button id="themeDark" aria-pressed="true">Dark</button>
        <button id="themeLight" aria-pressed="false">Light</button>
      </div>
    </header>

    <div class="search">
      <div class="search-row">
        <svg class="pin-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 21l-4.3-4.3"/><circle cx="11" cy="11" r="7"/>
        </svg>
        <input id="q" type="text" enterkeyhint="search" aria-label="Search a city or place"
               placeholder="Search a city or place…" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <div class="loc" id="loc">
      <div class="place" id="locPlace">—</div>
      <div class="coords" id="locCoords">—</div>
    </div>

    <div class="views">
      <div class="seg" role="group" aria-label="View">
        <button id="viewTuner" aria-pressed="true">Tuner</button>
        <button id="viewList" aria-pressed="false">List</button>
      </div>
    </div>

    <div class="tuner show" id="tuner">
      <div class="readout">
        <div class="rd-line">
          <span class="rd-wrap"><span class="rd-ghost" id="rdGhost" aria-hidden="true">88.8</span><span class="rd-freq" id="rdFreq">--.-</span></span><span class="rd-unit" id="rdUnit">FM · MHz</span>
        </div>
        <span class="rd-near" id="rdNear">Awaiting signal · drop pin</span>
      </div>
      <div class="dial" id="dial" tabindex="0" role="slider" aria-label="Tuning dial" aria-disabled="true"
           aria-valuemin="87.5" aria-valuemax="108" aria-valuenow="98">
        <div class="strip" id="strip"></div>
        <div class="mask-l"></div><div class="mask-r"></div>
        <div class="needle"></div>
        <div class="dial-empty" id="dialEmpty"></div>
      </div>
      <div class="bandrow">
        <div class="seg" role="group" aria-label="Band">
          <button id="bandFm" aria-pressed="true">FM</button>
          <button id="bandAm" aria-pressed="false">AM</button>
        </div>
      </div>
    </div>

    <div class="sports" id="sports">
      <div class="leaguebar" id="leaguebar" role="group" aria-label="League"></div>
      <div class="games" id="games"></div>
    </div>

    <div class="list" id="list">
      <div class="status"><span class="big">Awaiting fix</span>
        Drop a pin to acquire</div>
    </div>

    <div class="dock empty" id="dock">No signal locked</div>

    <div class="credits">
      Stations <a href="https://www.radio-browser.info" target="_blank" rel="noopener">Radio&nbsp;Browser</a> ·
      Places <a href="https://openstreetmap.org" target="_blank" rel="noopener">OpenStreetMap</a> ·
      Map <a href="https://carto.com" target="_blank" rel="noopener">CARTO</a>
    </div>
  </section>

  <audio id="audio"></audio>
  <div id="sr-status" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
(() => {
  "use strict";

  // ---------- Config ----------
  const STYLES = {
    dark:  "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
    light: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
  };
  const RB_MIRRORS = [
    "https://de1.api.radio-browser.info",
    "https://nl1.api.radio-browser.info",
    "https://at1.api.radio-browser.info",
  ];
  // Band definitions. value units: FM = MHz, AM = kHz.
  const BANDS = {
    fm: { min:87.5, max:108,  step:0.2, tol:0.2, pxU:62,   unit:"FM · MHz", spoken:"FM megahertz", idle:"--.-", fmt:v=>v.toFixed(1) },
    am: { min:530,  max:1700, step:10,  tol:20,  pxU:0.86, unit:"AM · kHz", spoken:"AM kilohertz", idle:"----", fmt:v=>String(Math.round(v)) },
  };
  // Tunable constants (was scattered magic numbers).
  const TUNING = {
    fetchTimeout: 8000,  // ms before a network request aborts
    settleDelay:  260,   // ms idle on the dial before snapping onto a station
    errorGrace:   400,   // ms after a src swap during which audio "error" events are ignored
    flySpeed:     0.9,
    staticIdle:   0.045, // hiss level on empty air
    staticTouch:  0.05,  // hiss on grabbing the dial
    staticStep:   0.04,  // hiss on a discrete (wheel/key) tune
    staticMin:    0.012, // hiss right on a station
    staticMax:    0.06,  // hiss far from any station
  };

  // ---------- State ----------
  let theme="dark", band="fm", view="tuner";
  let marker=null, activeUuid=null, reqToken=0;
  let allStations=[], byBand={fm:[], am:[]};
  let freq=98.0, hasLocation=false;
  let pinLat=null, pinLon=null, pinCity="", pinState="";

  // ---------- DOM ----------
  const $ = id => document.getElementById(id);
  const dialEl=$("dial"), stripEl=$("strip"), rdFreq=$("rdFreq"), rdGhost=$("rdGhost"), rdUnit=$("rdUnit"),
        rdNear=$("rdNear"), dialEmpty=$("dialEmpty"), listEl=$("list"), dock=$("dock"),
        audio=$("audio"), srStatus=$("sr-status"), leaguebarEl=$("leaguebar"), gamesEl=$("games");
  const themeColorMeta = document.querySelector('meta[name="theme-color"]');
  const reduceMotion = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
  // iOS ignores audio.volume entirely (hardware buttons only) — don't render a dead slider there.
  const IS_IOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);

  // restore last volume
  try { const v=parseFloat(localStorage.getItem("tt.vol")); if(v>=0 && v<=1) audio.volume=v; } catch(_){}

  function announce(msg){ if(srStatus) srStatus.textContent = msg; }

  // ---------- Map ----------
  const map = new maplibregl.Map({
    container:"map", style:STYLES.dark, center:[-80.84,35.23], zoom:9,
    attributionControl:{ compact:true },
  });
  map.addControl(new maplibregl.NavigationControl({ showCompass:false }), "bottom-right");
  map.on("click", e => { const q=$("q"); if(document.activeElement===q) q.blur(); setLocation(e.lngLat.lat, e.lngLat.lng); });

  function flyOrJump(lon,lat){
    const opts={ center:[lon,lat], zoom:Math.max(map.getZoom(),9) };
    if(reduceMotion) map.jumpTo(opts);
    else map.flyTo(Object.assign({ speed:TUNING.flySpeed }, opts));
  }

  // ---------- Theme ----------
  const btnDark=$("themeDark"), btnLight=$("themeLight");
  function setTheme(t){
    theme=t; document.documentElement.setAttribute("data-theme",t);
    btnDark.setAttribute("aria-pressed", String(t==="dark"));
    btnLight.setAttribute("aria-pressed", String(t==="light"));
    if(themeColorMeta) themeColorMeta.setAttribute("content", t==="dark" ? "#0a0a0b" : "#e7e2d6");
    map.setStyle(STYLES[t]);
  }
  btnDark.onclick=()=>setTheme("dark"); btnLight.onclick=()=>setTheme("light");

  // ---------- View toggle ----------
  const vT=$("viewTuner"), vL=$("viewList");
  function setView(v){
    view=v;
    vT.setAttribute("aria-pressed", String(v==="tuner"));
    vL.setAttribute("aria-pressed", String(v==="list"));
    $("tuner").classList.toggle("show", v==="tuner");
    $("sports").classList.toggle("show", v==="sports");
    if(v==="tuner") requestAnimationFrame(renderDial);
    if(v==="sports") renderSports();
    renderList();
  }
  vT.onclick=()=>{ setView("tuner"); if(hasLocation) dialEl.focus({preventScroll:true}); };
  vL.onclick=()=>setView("list");
  $("ctaSports").onclick=()=>setView("sports");

  // ---------- Band toggle ----------
  const bFm=$("bandFm"), bAm=$("bandAm");
  function setBand(b){
    band=b;
    bFm.setAttribute("aria-pressed", String(b==="fm"));
    bAm.setAttribute("aria-pressed", String(b==="am"));
    const B=BANDS[b];
    // place needle on a sensible default for this band
    const list=byBand[b];
    freq = list.length ? list[Math.floor(list.length/2)].freq.value : (B.min+B.max)/2;
    dialEl.setAttribute("aria-valuemin", B.min); dialEl.setAttribute("aria-valuemax", B.max);
    buildStrip(); requestAnimationFrame(renderDial); renderList();
  }
  bFm.onclick=()=>setBand("fm"); bAm.onclick=()=>setBand("am");

  // ---------- Network ----------
  async function fetchJSON(url, opts){
    const ctl = new AbortController();
    const timer = setTimeout(()=>ctl.abort(), TUNING.fetchTimeout);
    try {
      const r = await fetch(url, Object.assign({ signal:ctl.signal, headers:{Accept:"application/json"} }, opts));
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.json();
    } finally { clearTimeout(timer); }
  }

  // ---------- Geocoding (Nominatim, free) ----------
  async function geocode(query){
    const url="https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&accept-language=en&q="+encodeURIComponent(query);
    const j=await fetchJSON(url);
    if(!j.length) return null;
    return { lat:+j[0].lat, lon:+j[0].lon };
  }
  async function reverse(lat,lon){
    const url="https://nominatim.openstreetmap.org/reverse?format=jsonv2&accept-language=en&lat="+lat+"&lon="+lon;
    const j=await fetchJSON(url);
    const a=j.address||{};
    const place=[a.city||a.town||a.village||a.county, a.state, a.country].filter(Boolean).join(", ");
    return { countrycode:(a.country_code||"").toUpperCase(), state:a.state||"", place };
  }

  // ---------- Radio Browser ----------
  async function rbFetch(path){
    for(const base of RB_MIRRORS){
      try { return await fetchJSON(base+path); }
      catch(_){}
    }
    throw new Error("All Radio Browser mirrors unreachable");
  }
  function stationsQuery({countrycode,state}){
    const p=new URLSearchParams({order:"clickcount",reverse:"true",hidebroken:"true",limit:"150"});
    if(countrycode) p.set("countrycode",countrycode);
    if(state) p.set("state",state);
    return "/json/stations/search?"+p.toString();
  }

  // ---------- Frequency parsing ----------
  function parseFrequency(name){
    if(!name) return null;
    let m=name.match(/(?:^|[^\d.])(\d{2,3}(?:[.,]\d)?)\s?fm\b/i) || name.match(/\bfm\s?(\d{2,3}(?:[.,]\d)?)/i);
    if(m){ const v=parseFloat(m[1].replace(",",".")); if(v>=87.5&&v<=108) return {band:"fm",value:v,text:v.toFixed(1)+" FM"}; }
    m=name.match(/(?:^|[^\d])(\d{3,4})\s?am\b/i) || name.match(/\bam\s?(\d{3,4})\b/i);
    if(m){ const v=parseInt(m[1],10); if(v>=530&&v<=1700) return {band:"am",value:v,text:v+" AM"}; }
    m=name.match(/(?:^|[^\d.])((?:8[7-9]|9\d|10[0-7])[.,]\d)(?![\d.])/);
    if(m){ const v=parseFloat(m[1].replace(",",".")); if(v>=87.5&&v<=108) return {band:"fm",value:v,text:v.toFixed(1)+" FM"}; }
    return null;
  }

  // ---------- Location flow ----------
  function makePin(){ const el=document.createElement("div"); el.className="pin";
    el.innerHTML='<span class="ring"></span><span class="dot"></span>'; return el; }

  async function setLocation(lat,lon){
    const token=++reqToken; hasLocation=true;
    pinLat=lat; pinLon=lon;
    if(isMobileSheet() && sheetSnap==="peek") setSnap("full");   // location set → raise the sheet to show results
    clearTimeout(settleTimer); staticLevel(0);     // drop any pending snap / lingering hiss from the last spot
    dialEl.setAttribute("aria-disabled","false");
    if(marker) marker.setLngLat([lon,lat]);
    else marker=new maplibregl.Marker({element:makePin()}).setLngLat([lon,lat]).addTo(map);
    flyOrJump(lon,lat);

    $("loc").classList.add("show");
    $("locCoords").textContent=lat.toFixed(4)+", "+lon.toFixed(4);
    $("locPlace").textContent="Acquiring position…";
    listStatus("Scanning local frequencies…");

    let info; try{ info=await reverse(lat,lon); }catch(_){ info={countrycode:"",state:"",place:"Unknown area"}; }
    if(token!==reqToken) return;
    $("locPlace").textContent=info.place||"Unknown area";
    pinState=info.state||""; pinCity=(info.place||"").split(",")[0].trim();

    try{
      let list = info.state ? await rbFetch(stationsQuery({countrycode:info.countrycode, state:info.state})) : [];
      if((!list||list.length<5) && info.countrycode) list=await rbFetch(stationsQuery({countrycode:info.countrycode}));
      if(token!==reqToken) return;
      ingest(list||[]);
    }catch(_){
      if(token!==reqToken) return;
      listStatus("Signal directory unreachable.","Check your connection and try again.");
    }
  }

  // Rough squared distance from the pin (longitude scaled by latitude). Infinity when a station has no usable coords.
  function nearMetric(lat,lon){
    if(pinLat==null || !isFinite(lat) || !isFinite(lon) || (lat===0 && lon===0)) return Infinity;
    const dLat=lat-pinLat, dLon=(lon-pinLon)*Math.cos((lat+pinLat)/2*Math.PI/180);
    return dLat*dLat + dLon*dLon;
  }
  // Which co-channel station do you actually receive here? Best-effort, in priority order:
  //  1) the nearest station with trustworthy *nearby* coords, else
  //  2) a station whose name/tags/state names your city, else
  //  3) a station in your state, else 4) the most-popular.
  function mentionsLocality(s){
    if(!pinCity) return false;
    return ((s.name||"")+" "+(s.tags||"")+" "+(s.state||"")).toLowerCase().indexOf(pinCity.toLowerCase())>=0;
  }
  function pickPrimary(grp){
    if(grp.length===1) return grp[0];
    const GEO_NEAR=1.0;  // ~110km in the scaled-degree metric: close enough to plausibly receive
    const near=grp.filter(x=>x.station._d<=GEO_NEAR);
    if(near.length) return near.reduce((a,b)=> b.station._d<a.station._d ? b : a);
    const local=grp.filter(x=>mentionsLocality(x.station));
    if(local.length) return local[0];                      // grp keeps clickcount order => most-popular local
    const inState=pinState ? grp.filter(x=>(x.station.state||"").toLowerCase()===pinState.toLowerCase()) : [];
    if(inState.length) return inState[0];
    return grp[0];
  }
  // One station per frequency on the dial; co-channel alternates are stashed on the survivor
  // and remain in the full List view.
  function dedupeCoChannel(items){
    const groups=new Map();
    items.forEach(x=>{ const k=x.freq.value; if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(x); });
    const out=[];
    groups.forEach(grp=>{
      const primary=pickPrimary(grp);
      if(grp.length>1) primary.station.coChannel=grp.filter(x=>x!==primary).map(x=>x.station);
      out.push(primary);
    });
    return out.sort((a,b)=>a.freq.value-b.freq.value);
  }
  function ingest(list){
    allStations=list;
    const fm=[], am=[];
    list.forEach(s=>{
      const f=parseFrequency(s.name); s.freq=f; s.coChannel=null;
      s._d=nearMetric(parseFloat(s.geo_lat), parseFloat(s.geo_long));
      if(f) (f.band==="fm"?fm:am).push({station:s, freq:f});
    });
    byBand={ fm:dedupeCoChannel(fm), am:dedupeCoChannel(am) };
    // default band: whichever has stations (prefer FM)
    if(byBand.fm.length===0 && byBand.am.length>0 && band==="fm") setBand("am");
    else setBand(band);
  }

  // ---------- List rendering ----------
  function listStatus(big,small){
    listEl.classList.add("show");
    const wrap=document.createElement("div"); wrap.className="status";
    const b=document.createElement("span"); b.className="big"; b.textContent=big; wrap.appendChild(b);
    if(small) wrap.appendChild(document.createTextNode(small));
    listEl.innerHTML=""; listEl.appendChild(wrap);
    announce(big + (small ? ". "+small : ""));
  }
  function stationRow(s){
    const row=document.createElement("div");
    const isActive=s.stationuuid===activeUuid;
    row.className="station"+(isActive?" active":"");
    row.dataset.uuid=s.stationuuid;
    row.setAttribute("role","button");
    row.tabIndex=0;
    row.setAttribute("aria-label","Play "+(s.name||"station")+(s.freq?", "+s.freq.text:""));
    if(isActive) row.setAttribute("aria-current","true");
    const f=s.freq;
    const badge=f ? '<span class="freq">'+esc(f.text)+'</span>'
      : '<span class="freq codec">'+esc(s.codec||"—")+(s.bitrate?" "+s.bitrate:"")+'</span>';
    const sub=[s.state,(s.tags||"").split(",").slice(0,2).join(" · ")].filter(Boolean).join("  ·  ");
    row.innerHTML=
      '<span class="fav" aria-hidden="true">'+(s.favicon?'<img loading="lazy" src="'+esc(s.favicon)+'" onerror="this.remove()">':wave())+'</span>'+
      '<span class="meta"><span class="name">'+esc(s.name||"Unknown")+'</span>'+
      '<span class="sub">'+esc(sub||"—")+'</span></span>'+badge;
    row.onclick=()=>play(s);
    row.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); play(s); } };
    return row;
  }
  function renderList(){
    if(view==="sports"){ listEl.classList.remove("show"); return; }
    if(!hasLocation){
      if(view==="list"){
        listEl.classList.add("show");
        listEl.innerHTML='<div class="status"><span class="big">Awaiting fix</span>'+
          'Drop a pin to acquire</div>';
      } else { listEl.classList.remove("show"); }
      return;
    }
    listEl.classList.add("show");
    const data = view==="tuner" ? byBand[band].map(x=>x.station) : allStations;
    listEl.innerHTML="";
    if(!data.length){
      listEl.innerHTML='<div class="status"><span class="big">'+
        (view==="tuner"?("No "+band.toUpperCase()+" signals here"):"No signals here")+
        '</span>'+(view==="tuner"?"Switch band, or open the List for the rest.":"Try a nearby city or a different spot.")+'</div>';
      return;
    }
    const frag=document.createDocumentFragment();
    data.forEach(s=>frag.appendChild(stationRow(s)));
    listEl.appendChild(frag);
    scrollActiveIntoView();
  }
  // Reveal a row by scrolling ONLY the list. scrollIntoView also scrolls ancestors on mobile,
  // which shoved the whole bottom sheet (handle + header) up off-screen.
  function revealRow(el){
    if(!el) return;
    const top=el.offsetTop, bottom=top+el.offsetHeight;
    const viewTop=listEl.scrollTop, viewBottom=viewTop+listEl.clientHeight;
    if(top<viewTop) listEl.scrollTop=top;
    else if(bottom>viewBottom) listEl.scrollTop=bottom-listEl.clientHeight;
    const rec=document.querySelector(".receiver");
    rec.scrollTop=0; rec.scrollLeft=0;            // insurance: the panel itself must never scroll
  }
  function scrollActiveIntoView(){
    revealRow(listEl.querySelector(".station.active"));
  }

  // ---------- Dial rendering ----------
  function buildStrip(){
    const B=BANDS[band];
    const width=(B.max-B.min)*B.pxU;
    stripEl.style.width=width+"px";
    let html="";
    const n=Math.round((B.max-B.min)/B.step);
    for(let i=0;i<=n;i++){
      const v=Math.round((B.min+i*B.step)*1000)/1000;
      const x=(v-B.min)*B.pxU;
      let cls="t min", label=null;
      if(band==="fm"){
        const isInt=Math.abs(v-Math.round(v))<0.001;
        if(isInt && Math.round(v)%2===0){ cls="t maj"; label=String(Math.round(v)); }
        else if(isInt){ cls="t med"; }
      } else {
        if(v%100===0){ cls="t maj"; label=String(v); }
        else if(v%50===0){ cls="t med"; }
      }
      html+='<span class="'+cls+'" style="left:'+x+'px"></span>';
      if(label!==null) html+='<span class="tlab" style="left:'+x+'px">'+label+'</span>';
    }
    // station pips
    byBand[band].forEach(x=>{
      const px=(x.freq.value-B.min)*B.pxU;
      const multi=(x.station.coChannel&&x.station.coChannel.length)?" multi":"";
      html+='<span class="pip'+multi+'" data-uuid="'+x.station.stationuuid+'" style="left:'+px+'px"></span>';
    });
    stripEl.innerHTML=html;
    dialEmpty.classList.toggle("show", hasLocation && byBand[band].length===0);
    if(hasLocation && byBand[band].length===0)
      dialEmpty.textContent="No "+band.toUpperCase()+" signals detected — see the List.";
  }

  function nearestStation(){
    const list=byBand[band]; if(!list.length) return null;
    let best=null, bd=Infinity;
    for(const x of list){ const d=Math.abs(x.freq.value-freq); if(d<bd){ bd=d; best=x; } }
    return { x:best, dist:bd };
  }

  function renderDial(){
    const B=BANDS[band];
    freq=Math.min(B.max, Math.max(B.min, freq));
    const center=dialEl.clientWidth/2;
    const x=(freq-B.min)*B.pxU;
    stripEl.style.transform="translateX("+(center-x)+"px)";
    rdFreq.textContent = hasLocation ? B.fmt(freq) : B.idle;
    rdGhost.textContent = rdFreq.textContent.replace(/[0-9-]/g,"8");  // dim all-segments LCD backdrop
    rdUnit.textContent = B.unit;
    dialEl.setAttribute("aria-valuenow", B.fmt(freq));
    dialEl.setAttribute("aria-disabled", String(!hasLocation));

    // highlight nearest pip + preview name
    stripEl.querySelectorAll(".pip.near").forEach(p=>p.classList.remove("near"));
    const near=nearestStation();
    let speak = B.fmt(freq)+" "+B.spoken;
    if(near && near.dist<=B.tol*2){
      warmConnection(near.x.station);            // pre-warm the stream connection as you approach
      const pip=stripEl.querySelector('.pip[data-uuid="'+cssEsc(near.x.station.stationuuid)+'"]');
      if(pip && near.dist<=B.tol) pip.classList.add("near");
      const locked = near.dist<=B.tol;
      const nm = near.x.station.name||"";
      rdNear.innerHTML = (locked?'▸ LOCK · ':'~ ')+'<b>'+esc(nm)+'</b>';
      speak += locked ? ", locked on "+nm : ", near "+nm;
    } else if(hasLocation){
      const other = band==="fm" ? "am" : "fm";
      if(byBand[band].length){ rdNear.innerHTML = "· between signals ·"; speak += ", between stations"; }
      else if(byBand[other].length){ rdNear.innerHTML = "· try the "+other.toUpperCase()+" band ·"; }
      else rdNear.innerHTML = "";
    }
    if(hasLocation) dialEl.setAttribute("aria-valuetext", speak);
  }

  // ---------- Dial interaction ----------
  let dragging=false, lastX=0, settleTimer=null, raf=null, snapRaf=null;
  function scheduleRender(){ if(raf) return; raf=requestAnimationFrame(()=>{ raf=null; renderDial(); }); }
  function cancelSnap(){ if(snapRaf){ cancelAnimationFrame(snapRaf); snapRaf=null; } }
  function snapTo(target){
    cancelSnap();
    const B=BANDS[band];
    if(reduceMotion || Math.abs(target-freq) < B.step*0.01){ freq=target; renderDial(); return; }
    const start=freq, dist=target-start; let startTs=null; const dur=180;
    const step=ts=>{
      if(startTs===null) startTs=ts;
      const p=Math.min(1,(ts-startTs)/dur), e=1-Math.pow(1-p,3); // easeOutCubic
      freq=start+dist*e; renderDial();
      if(p<1) snapRaf=requestAnimationFrame(step);
      else { snapRaf=null; freq=target; renderDial(); }
    };
    snapRaf=requestAnimationFrame(step);
  }
  function doSettle(){
    const B=BANDS[band], near=nearestStation();
    if(near && near.dist<=B.tol){
      snapTo(near.x.freq.value);              // ease exactly onto the station
      const s=near.x.station;
      if(s.stationuuid!==activeUuid || audio.paused) play(s);     // don't restart what's already playing
    } else {
      audio.pause();                          // tuned to empty air — stop the stream, let static fade out
      staticLevel(TUNING.staticIdle); setTimeout(()=>staticLevel(0), 900);
    }
  }
  function settle(){                          // debounced — for wheel / keyboard tuning
    clearTimeout(settleTimer);
    const myToken=reqToken;
    settleTimer=setTimeout(()=>{ if(myToken===reqToken) doSettle(); }, TUNING.settleDelay);
  }
  dialEl.addEventListener("pointerdown", e=>{
    if(!hasLocation) return;
    cancelSnap();
    dragging=true; lastX=e.clientX; dialEl.setPointerCapture(e.pointerId);
    ensureAudio(); staticLevel(TUNING.staticTouch);
  });
  dialEl.addEventListener("pointermove", e=>{
    if(!dragging) return;
    const dx=e.clientX-lastX; lastX=e.clientX;
    freq -= dx/BANDS[band].pxU; scheduleRender();
    // modulate static by distance to nearest station
    const B=BANDS[band], near=nearestStation();
    if(near) staticLevel(Math.min(TUNING.staticMax, TUNING.staticMin + near.dist/(B.tol*8)*0.05));
  });
  function endDrag(e){ if(!dragging) return; dragging=false;
    try{ dialEl.releasePointerCapture(e.pointerId); }catch(_){}
    clearTimeout(settleTimer); doSettle();    // play immediately, inside the touch gesture (mobile autoplay needs this)
  }
  dialEl.addEventListener("pointerup", endDrag);
  dialEl.addEventListener("pointercancel", endDrag);
  dialEl.addEventListener("wheel", e=>{
    if(!hasLocation) return; e.preventDefault();
    cancelSnap(); ensureAudio();
    freq += Math.sign(e.deltaY)*BANDS[band].step*(e.shiftKey?5:1);
    const B=BANDS[band], near=nearestStation();
    staticLevel(near ? Math.min(TUNING.staticMax, TUNING.staticMin + near.dist/(B.tol*8)*0.05) : TUNING.staticStep);
    scheduleRender(); settle();
  }, {passive:false});
  dialEl.addEventListener("keydown", e=>{
    if(!hasLocation) return;
    const s=BANDS[band].step*(e.shiftKey?5:1);
    if(e.key==="ArrowRight"||e.key==="ArrowUp"){ freq+=s; }
    else if(e.key==="ArrowLeft"||e.key==="ArrowDown"){ freq-=s; }
    else return;
    e.preventDefault();
    cancelSnap(); ensureAudio(); staticLevel(TUNING.staticStep);
    scheduleRender(); settle();
  });
  window.addEventListener("resize", ()=>{ if(view==="tuner") renderDial(); });

  // ---------- Static hiss (Web Audio) ----------
  let actx=null, noiseGain=null;
  function ensureAudio(){
    if(actx){ if(actx.state==="suspended") actx.resume().catch(()=>{}); return; }
    try{
      actx=new (window.AudioContext||window.webkitAudioContext)();
      const size=2*actx.sampleRate, buf=actx.createBuffer(1,size,actx.sampleRate), d=buf.getChannelData(0);
      for(let i=0;i<size;i++) d[i]=Math.random()*2-1;
      const src=actx.createBufferSource(); src.buffer=buf; src.loop=true;
      const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=5200;
      noiseGain=actx.createGain(); noiseGain.gain.value=0;
      src.connect(lp).connect(noiseGain).connect(actx.destination); src.start();
    }catch(_){ /* Web Audio unavailable — dial still works, just silent between stations */ }
  }
  function staticLevel(v){ if(noiseGain) noiseGain.gain.setTargetAtTime(v, actx.currentTime, 0.05); }

  // ---------- Playback ----------
  let current=null, lastPlayTs=0;
  // Speculatively warm DNS+TCP+TLS to a station's stream host as you tune near it, so playback starts sooner.
  const warmedHosts=new Set();
  function warmConnection(s){
    if(!s) return;
    let origin; try{ origin=new URL(s.url_resolved||s.url).origin; }catch(_){ return; }
    if(location.protocol==="https:" && origin.indexOf("http://")===0) origin="https:"+origin.slice(5);
    if(warmedHosts.has(origin)) return;
    warmedHosts.add(origin);
    const l=document.createElement("link"); l.rel="preconnect"; l.href=origin;
    document.head.appendChild(l);
  }
  function play(s){
    activeUuid=s.stationuuid; current=s;
    staticLevel(0);
    listEl.querySelectorAll(".station.active").forEach(n=>{ n.classList.remove("active"); n.removeAttribute("aria-current"); });
    const row=listEl.querySelector('.station[data-uuid="'+cssEsc(s.stationuuid)+'"]');
    if(row){ row.classList.add("active"); row.setAttribute("aria-current","true"); revealRow(row); }
    // sync the dial to the played station (only when it's on the current band)
    if(s.freq && s.freq.band===band){ freq=s.freq.value; if(view==="tuner") renderDial(); }

    let url=s.url_resolved||s.url;
    // Mixed content: an https page can't load an http stream. Upgrade where the station also serves https
    // (best-effort — http-only streams will fail and surface the "signal lost" state).
    if(url && location.protocol==="https:" && url.indexOf("http://")===0) url="https:"+url.slice(5);
    if(!url){
      audio.pause(); audio.removeAttribute("src"); audio.load();
      renderDock(s,"error");
      announce("Couldn’t play "+(s.name||"station")+" — no stream available.");
      return;
    }
    lastPlayTs=Date.now();
    audio.src=url;
    audio.play().catch(()=>{});
    renderDock(s,"connecting");
    announce("Now playing "+(s.name||"station")+(s.freq?" on "+s.freq.text:""));
    fetch(RB_MIRRORS[0]+"/json/url/"+s.stationuuid).catch(()=>{});
  }
  // Next candidate when a stream dies: walk up the dial on the station's band (wrapping),
  // else through the full list; skip anything without a stream URL.
  function nextStation(s){
    if(!s) return null;
    const b=s.freq&&s.freq.band;
    const lst=(b&&byBand[b].length)?byBand[b].map(x=>x.station):allStations;
    if(!lst.length) return null;
    const i=lst.findIndex(x=>x.stationuuid===s.stationuuid);
    for(let k=1;k<=lst.length;k++){
      const c=lst[(i+k+lst.length)%lst.length];
      if(c.stationuuid!==s.stationuuid && (c.url_resolved||c.url)) return c;
    }
    return null;
  }
  function renderDock(s,mode){    // mode: "connecting" | "live" | "error"
    const f=s.freq;
    dock.className="dock playing"+(mode==="connecting"?" connecting":"");
    let sub;
    if(mode==="error") sub="Signal lost";
    else if(mode==="connecting") sub='<span class="np-spinner" aria-hidden="true"></span>Connecting…';
    else sub='<span class="signal-bars" aria-hidden="true"><i></i><i></i><i></i><i></i></span>'+(f?'<span class="np-freq">'+esc(f.text)+'</span>':esc(s.codec||"live"));
    const third = mode==="error"
      ? '<button class="skipbtn" id="skipNext" aria-label="Try the next station">Next ▸</button>'
      : (IS_IOS ? '' :
        '<input class="vol" id="vol" type="range" min="0" max="1" step="0.01" value="'+audio.volume+'"'+
        ' aria-label="Volume" aria-valuetext="'+Math.round(audio.volume*100)+'%">');
    dock.innerHTML=
      '<button class="playbtn" id="pp" aria-label="Pause">'+iconPause()+'</button>'+
      '<div class="np"><div class="np-name">'+esc(s.name||"Unknown")+'</div>'+
        '<div class="np-sub'+(mode==="error"?" error":"")+'">'+sub+'</div></div>'+third;
    $("pp").onclick=togglePlay;
    const sk=$("skipNext");
    if(sk) sk.onclick=()=>{ const n=nextStation(current); if(n) play(n); else announce("No other stations to try."); };
    const vol=$("vol");
    if(vol) vol.oninput=e=>{
      audio.volume=+e.target.value;
      vol.setAttribute("aria-valuetext", Math.round(audio.volume*100)+"%");
      try{ localStorage.setItem("tt.vol", String(audio.volume)); }catch(_){}
    };
  }
  function togglePlay(){ if(audio.paused) audio.play().catch(()=>{}); else audio.pause(); }
  audio.addEventListener("playing",()=>{ if(current) renderDock(current,"live"); });
  audio.addEventListener("pause",  ()=>{ dock.classList.remove("playing"); const pp=$("pp"); if(pp){ pp.innerHTML=iconPlay(); pp.setAttribute("aria-label","Play"); } });
  audio.addEventListener("error",  ()=>{
    if(!current) return;
    if(Date.now()-lastPlayTs < TUNING.errorGrace) return;  // ignore the transient error fired right after a src swap
    renderDock(current,"error");
    announce("Signal lost on "+(current.name||"station")+". Tune to another station.");
  });

  // ---------- Search ----------
  let searching=false;
  $("q").addEventListener("keydown", async e=>{
    if(e.key==="Escape"){ e.target.value=""; e.target.blur(); return; }
    if(e.key!=="Enter" || !e.target.value.trim() || searching) return;
    searching=true;
    e.target.blur();                               // dismiss the mobile keyboard so the viewport restores before the sheet expands
    listStatus("Locating coordinates…");
    try{ const g=await geocode(e.target.value.trim());
      if(!g){ listStatus("No match found","Try a more specific name."); return; }
      setLocation(g.lat,g.lon);
    }catch(_){ listStatus("Scan failed","Check your connection and try again."); }
    finally{ searching=false; }
  });
  // iOS can leave the page panned up after the keyboard closes, hiding the sheet's top — undo it.
  $("q").addEventListener("blur", ()=>{ setTimeout(()=>window.scrollTo(0,0), 60); });

  // ---------- Sports ("on the radio") ----------
  let sportsLeague="mlb", sportsToken=0;
  function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function fmtTime(iso){ if(!iso) return "TBD"; try{ return new Date(iso).toLocaleString([], {weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit"}); }catch(_){ return iso; } }

  // MLB: free Stats API carries radio per game — zero curated data.
  async function fetchMLB(){
    const j=await fetchJSON("https://statsapi.mlb.com/api/v1/schedule?sportId=1&date="+todayStr()+"&hydrate=broadcasts(all)");
    const games=(j.dates&&j.dates[0]&&j.dates[0].games)||[];
    return games.map(g=>({
      when:g.gameDate, state:(g.status||{}).abstractGameState,
      away:(g.teams.away.team||{}).name||"?", home:(g.teams.home.team||{}).name||"?",
      radios:[...new Set((g.broadcasts||[]).filter(b=>b.type==="AM"||b.type==="FM"||b.mediaType==="Audio").map(b=>b.callSign||b.name).filter(Boolean))]
    }));
  }
  // Generic ESPN scoreboard fetcher over the next N days. Returns team abbreviations (for flagship lookup)
  // AND venue/city (for the soccer "tune into the host city" path).
  async function espnDays(path, days){
    const base=new Date(), ds=[];
    for(let i=0;i<days;i++){ const d=new Date(base.getTime()+i*86400000);
      ds.push(d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")); }
    const res=await Promise.all(ds.map(dd=>fetchJSON("https://site.api.espn.com/apis/site/v2/sports/"+path+"/scoreboard?dates="+dd).catch(()=>null)));
    const out=[];
    res.forEach(j=>{ if(!j||!j.events) return; j.events.forEach(e=>{
      const c=(e.competitions&&e.competitions[0])||{}, comp=c.competitors||[], v=c.venue||{};
      const home=comp.find(x=>x.homeAway==="home")||{}, away=comp.find(x=>x.homeAway==="away")||{};
      out.push({ when:e.date, state:((e.status||{}).type||{}).shortDetail||"",
        homeAbbr:(home.team||{}).abbreviation, awayAbbr:(away.team||{}).abbreviation,
        home:(home.team||{}).displayName||(home.team||{}).name||"?", away:(away.team||{}).displayName||(away.team||{}).name||"?",
        venue:v.fullName||"", venueCity:[(v.address||{}).city,(v.address||{}).state,(v.address||{}).country].filter(Boolean).join(", ") });
    }); });
    out.sort((a,b)=> new Date(a.when)-new Date(b.when));
    return out.slice(0,50);
  }

  // Team radio flagships — best-effort, hand-authored (call signs/brands change; spot-check before relying).
  // Keyed by ESPN abbreviation. Gaps intentionally show "not listed" rather than risk a wrong station.
  const NHL_RADIO={
    ANA:"AM 830 KLAA", BOS:"98.5 The Sports Hub", BUF:"WGR Sports Radio 550",
    CGY:"Sportsnet 960", CAR:"99.9 The Fan", CHI:"WGN Radio 720", CBJ:"97.1 The Fan",
    DAL:"Sportsradio 1310 The Ticket", DET:"97.1 The Ticket", EDM:"630 CHED",
    MIN:"KFAN 100.3", MTL:"TSN 690", NSH:"102.5 The Game", OTT:"TSN 1200",
    PHI:"97.5 The Fanatic", PIT:"105.9 The X", SEA:"Seattle Sports 710",
    STL:"101 ESPN", TOR:"Sportsnet 590 The Fan", VAN:"Sportsnet 650",
    VGK:"Fox Sports 1340", WSH:"106.7 The Fan", WPG:"TSN 1290"
  };
  const NBA_RADIO={
    ATL:"92.9 The Game", BOS:"98.5 The Sports Hub", CHA:"WFNZ 102.5 The Fan",
    CHI:"670 The Score", CLE:"92.3 The Fan", DET:"97.1 The Ticket", GS:"95.7 The Game",
    IND:"107.5 The Fan", MEM:"92.9 ESPN", MIA:"790 The Ticket", NY:"98.7 ESPN New York",
    OKC:"The Sports Animal", PHI:"97.5 The Fanatic", PHX:"Arizona Sports 98.7",
    POR:"Rip City Radio 620", TOR:"Sportsnet 590 The Fan", UTAH:"1280 The Zone", WSH:"106.7 The Fan"
  };

  const LEAGUES=[
    { key:"mlb", name:"MLB",       kind:"radio",  fetch:fetchMLB, empty:"No MLB games today." },
    { key:"nhl", name:"NHL",       kind:"team",   table:NHL_RADIO, fetch:()=>espnDays("hockey/nhl",4),     empty:"No NHL games scheduled." },
    { key:"nba", name:"NBA",       kind:"team",   table:NBA_RADIO, fetch:()=>espnDays("basketball/nba",4),  empty:"No NBA games scheduled." },
    { key:"mls", name:"MLS",       kind:"soccer", fetch:()=>espnDays("soccer/usa.1",7), empty:"No MLS matches in the next 7 days." },
    { key:"nfl", name:"NFL", kind:"todo" },
    { key:"epl", name:"Premier League", kind:"todo" },
  ];

  function renderLeagueBar(){
    leaguebarEl.innerHTML=LEAGUES.map(l=>'<button data-k="'+l.key+'" aria-pressed="'+(l.key===sportsLeague)+'">'+esc(l.name)+'</button>').join("");
  }
  function radioCard(g){
    const radios=g.radios.length
      ? g.radios.map(r=>'<button class="rbtn" data-name="'+esc(r)+'">'+esc(r)+'</button>').join("")
      : '<span class="gnote">No radio station listed</span>';
    return '<div class="game"><div class="gtime">'+esc(fmtTime(g.when))+(g.state?' · '+esc(g.state):"")+'</div>'+
      '<div class="gmatch">'+esc(g.away)+' @ '+esc(g.home)+'</div>'+
      '<div class="gradio">'+radios+'</div></div>';
  }
  function soccerCard(g){
    const city=(g.venueCity||"").split(",")[0];
    return '<div class="game"><div class="gtime">'+esc(fmtTime(g.when))+(g.venue?' · '+esc(g.venue):"")+'</div>'+
      '<div class="gmatch">'+esc(g.home)+' vs '+esc(g.away)+'</div>'+
      (g.venueCity?'<div class="gradio"><button class="citybtn" data-city="'+esc(g.venueCity)+'">Tune in '+esc(city)+'</button></div>':"")+
      '<div class="gnote">Match audio is often national or rights-restricted — “Tune in” loads the host city’s local radio.</div></div>';
  }
  function teamCard(g, table){
    const stns=[];
    [[g.awayAbbr,g.away],[g.homeAbbr,g.home]].forEach(([abbr])=>{ const s=table&&table[abbr]; if(s) stns.push(s); });
    const btns = stns.length ? stns.map(s=>'<button class="rbtn" data-name="'+esc(s)+'">'+esc(s)+'</button>').join("")
      : '<span class="gnote">Flagship radio not listed for these teams yet</span>';
    return '<div class="game"><div class="gtime">'+esc(fmtTime(g.when))+(g.state?' · '+esc(g.state):"")+'</div>'+
      '<div class="gmatch">'+esc(g.away)+' @ '+esc(g.home)+'</div>'+
      '<div class="gradio">'+btns+'</div></div>';
  }
  async function renderSports(){
    const myT=++sportsToken;
    renderLeagueBar();
    const L=LEAGUES.find(x=>x.key===sportsLeague)||LEAGUES[0];
    if(L.kind==="todo"){ gamesEl.innerHTML='<div class="status"><span class="big">'+esc(L.name)+'</span>Curated radio data coming next.</div>'; return; }
    gamesEl.innerHTML='<div class="status">Loading '+esc(L.name)+'…</div>';
    let games;
    try{ games=await L.fetch(); }
    catch(_){ if(myT===sportsToken) gamesEl.innerHTML='<div class="status"><span class="big">Couldn’t load '+esc(L.name)+'</span>Check your connection and try again.</div>'; return; }
    if(myT!==sportsToken) return;
    if(!games.length){ gamesEl.innerHTML='<div class="status"><span class="big">No games scheduled</span>'+esc(L.empty||"")+'</div>'; return; }
    gamesEl.innerHTML=games.map(g=> L.kind==="soccer"?soccerCard(g): L.kind==="team"?teamCard(g,L.table): radioCard(g)).join("");
  }
  leaguebarEl.onclick=e=>{ const b=e.target.closest("button[data-k]"); if(b){ sportsLeague=b.dataset.k; renderSports(); } };
  gamesEl.onclick=e=>{
    const rb=e.target.closest(".rbtn"); if(rb){ playByName(rb.dataset.name); return; }
    const cb=e.target.closest(".citybtn"); if(cb){ goToCity(cb.dataset.city); return; }
  };
  // Best-effort: match a broadcast station name to a playable Radio Browser stream.
  async function playByName(name){
    ensureAudio(); announce("Finding "+name+"…");
    try{
      const r=await rbFetch("/json/stations/search?name="+encodeURIComponent(name)+"&order=clickcount&reverse=true&hidebroken=true&limit=1");
      if(r&&r.length) play(r[0]);
      else announce("Couldn’t find "+name+" in the directory — it may not stream online.");
    }catch(_){ announce("Lookup failed for "+name); }
  }
  // World Cup: fly to the host city and load its local radio.
  async function goToCity(city){
    if(!city) return;
    listStatus("Locating "+city+"…");
    try{ const g=await geocode(city); if(g){ setView("tuner"); setLocation(g.lat,g.lon); } else announce("Couldn’t locate "+city); }
    catch(_){ announce("Couldn’t locate "+city); }
  }

  // ---------- Helpers ----------
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function cssEsc(s){ return String(s).replace(/["\\]/g,"\\$&"); }
  function wave(){ return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M2 12h3l3-7 4 14 3-10 2 3h5"/></svg>'; }
  function iconPlay(){ return '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 5v14l12-7z"/></svg>'; }
  function iconPause(){ return '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>'; }

  // ---------- Mobile bottom sheet (peek / half / full) ----------
  const sheetEl=document.querySelector(".receiver"), sheetHandle=$("sheetHandle");
  let sheetSnap="peek";
  const isMobileSheet=()=> window.matchMedia("(max-width:640px)").matches;
  function snapY(state){
    const H=sheetEl.getBoundingClientRect().height;
    return state==="full" ? 0 : Math.max(0, H - 112);   // full | peek (peek shows handle + header; search floats on the map)
  }
  // On mobile the search bar + location readout float over the map (the sheet ate too much height);
  // on desktop they live in the panel. Same nodes either way — listeners survive the move.
  const mapTopbar=$("mapTopbar"), searchSec=document.querySelector(".search"), locSec=$("loc");
  function placeChrome(){
    if(isMobileSheet()){
      if(searchSec.parentElement!==mapTopbar){ mapTopbar.appendChild(searchSec); mapTopbar.appendChild(locSec); }
    } else if(searchSec.parentElement===mapTopbar){
      const head=document.querySelector(".head");
      head.after(searchSec); searchSec.after(locSec);
    }
  }
  function applySheet(){ sheetEl.style.transform = isMobileSheet() ? "translateY("+snapY(sheetSnap)+"px)" : ""; }
  function setSnap(s){
    sheetSnap=s;
    sheetEl.classList.toggle("sheet-open", s==="full");
    sheetHandle.setAttribute("aria-expanded", String(s==="full"));
    applySheet();
  }
  function toggleSheet(){ setSnap(sheetSnap==="full"?"peek":"full"); }
  sheetHandle.addEventListener("click", ()=>{ if(isMobileSheet()) toggleSheet(); });
  sheetHandle.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp"){ e.preventDefault(); setSnap("full"); }
    else if(e.key==="ArrowDown"){ e.preventDefault(); setSnap("peek"); }
    else if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggleSheet(); }
  });
  window.addEventListener("resize", ()=>{ placeChrome(); applySheet(); });
  placeChrome(); applySheet();

  buildStrip(); requestAnimationFrame(renderDial);
  setView("tuner");
})();
</script>
</body>
</html>
